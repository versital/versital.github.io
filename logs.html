<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Logs | Tabby Slime</title>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --card-bg: #1a1a2e;
            --accent-color: #a855f7;
            --text-color: #e2e8f0;
            --text-dim: #94a3b8;
            --border-color: rgba(168, 85, 247, 0.2);
            --hover-bg: rgba(168, 85, 247, 0.1);
            --deep-purple: #3c096c;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 20%);
        }
        .decoration {
            position: fixed;
            top: -10vh;
            z-index: -1;
            user-select: none;
            pointer-events: none;
            opacity: 0.4;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 0;
            flex-shrink: 0;
        }

        header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px var(--deep-purple);
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .main-content {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 20px 20px;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        .logs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            box-sizing: border-box;
            animation: wobble 4s ease-in-out infinite;
            background: rgba(45, 0, 77, 0.4);
            border-radius: 40px;
            padding: 30px;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 25px var(--deep-purple), inset 0 0 15px var(--deep-purple);
        }
        @keyframes wobble {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        @media (max-width: 1000px) {
            .logs-grid {
                grid-template-columns: 1fr;
            }
        }

        .log-column {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .column-title {
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        .log-entry {
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.2s;
            user-select: none;
        }

        .run-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-right: 10px;
            transition: transform 0.1s, background 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .run-btn:hover {
            background: #c084fc;
            transform: scale(1.05);
        }

        .run-btn:active {
            transform: scale(0.95);
        }

        .log-header:hover {
            background-color: var(--hover-bg);
        }

        .timestamp {
            color: var(--accent-color);
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            margin-right: 15px;
            min-width: 160px;
            font-size: 0.85rem;
        }

        .summary {
            color: var(--text-color);
            flex-grow: 1;
            font-size: 0.9rem;
        }

        .chevron {
            transition: transform 0.3s;
            color: var(--text-dim);
            margin-left: 10px;
        }

        .log-entry.open .chevron {
            transform: rotate(180deg);
        }

        .log-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            padding: 0 10px;
        }

        .log-entry.open .log-details {
            max-height: 2000px;
            padding: 15px 10px;
        }

        .detail-section {
            margin-bottom: 15px;
        }

        .detail-label {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .detail-text {
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .results-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .results-text {
            font-family: 'Fira Code', monospace;
            padding: 10px;
            font-size: 0.85rem;
            color: #cbd5e1;
            white-space: pre;
            overflow: auto;
            max-height: 500px;
            display: block;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        .results-text::-webkit-scrollbar {
            height: 6px;
        }
        .results-text::-webkit-scrollbar-thumb {
            background-color: var(--accent-color);
            border-radius: 10px;
        }

        .scroll-btn {
            display: none;
        }

        #loading {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="decoration" style="top: 10%; left: 5%; font-size: 3rem;">🐈‍⬛</div>
    <div class="decoration" style="top: 20%; right: 10%; font-size: 2rem; animation-delay: 1s;">🐾</div>
    <div class="decoration" style="bottom: 15%; left: 15%; font-size: 2.5rem; animation-delay: 2s;">🟣</div>
    <div class="decoration" style="bottom: 10%; right: 5%; font-size: 1.5rem; animation-delay: 3s;">✨</div>

    <header>
        <h1>Sandbox Logs 🐾</h1>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="status.html">Status</a>
            <a href="heartbeat/index.html">Heartbeats</a>
        </div>
    </header>

    <div class="main-content">
        <div id="loading">Reading the slime scrolls...</div>
        
        <div class="logs-grid" id="logs-grid" style="display:none;">
            <!-- Heartbeat Column -->
            <div class="log-column">
                <div class="column-title">Heartbeat Registry</div>
                <div class="log-container">
                    <div id="heartbeat-list"></div>
                </div>
            </div>

            <!-- Execution Column -->
            <div class="log-column">
                <div class="column-title">Execution Results</div>
                <div class="log-container">
                    <div id="execution-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TUNNEL_URL = 'https://stages-marks-allowance-oregon.trycloudflare.com';
        const SECRET_KEY = 'tabby_secret_99_slime';

        async function fetchData(url) {
            const res = await fetch(url + '?v=' + new Date().getTime());
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            return await res.json();
        }

        async function runScript(scriptPath, btnElement, textId) {
            const originalText = btnElement.innerText;
            btnElement.innerText = '...';
            btnElement.disabled = true;

            try {
                const response = await fetch(`${TUNNEL_URL}/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tabby-Secret': SECRET_KEY
                    },
                    body: JSON.stringify({ script: scriptPath })
                });

                const data = await response.json();
                const resultEl = document.getElementById(textId);
                
                if (response.ok) {
                    resultEl.innerText = (data.stdout || '') + (data.stderr || '');
                } else {
                    resultEl.innerText = 'Error: ' + (data.error || 'Unknown failure');
                }
            } catch (e) {
                document.getElementById(textId).innerText = 'Network Error: ' + e.message;
            } finally {
                btnElement.innerText = originalText;
                btnElement.disabled = false;
            }
        }

        async function loadAllLogs() {
            const loadingEl = document.getElementById('loading');
            const gridEl = document.getElementById('logs-grid');
            const hbList = document.getElementById('heartbeat-list');
            const exList = document.getElementById('execution-list');

            try {
                const [hbData, exData] = await Promise.all([
                    fetchData('logs.json'),
                    fetchData('execution_logs.json')
                ]);

                loadingEl.style.display = 'none';
                gridEl.style.display = 'grid';

                hbList.innerHTML = '';
                if (!Array.isArray(hbData) || hbData.length === 0) {
                    hbList.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding: 20px;">No heartbeat logs yet. 🐾</div>';
                } else {
                    [...hbData].reverse().forEach(entry => {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        div.innerHTML = `
                            <div class="log-header" onclick="this.parentElement.classList.toggle('open')">
                                <span class="timestamp">${entry.timestamp}</span>
                                <span class="summary">${entry.summary}</span>
                                <span class="chevron">▼</span>
                            </div>
                            <div class="log-details">
                                <div class="detail-section">
                                    <span class="detail-label">What it does</span>
                                    <div class="detail-text">${entry.details?.what || 'N/A'}</div>
                                </div>
                                <div class="detail-section">
                                    <span class="detail-label">How it works</span>
                                    <div class="detail-text">${entry.details?.how || 'N/A'}</div>
                                </div>
                                <div class="detail-section">
                                    <span class="detail-label">How to use it</span>
                                    <div class="detail-text">${entry.details?.use || 'N/A'}</div>
                                </div>
                            </div>
                        `;
                        hbList.appendChild(div);
                    });
                }

                exList.innerHTML = '';
                if (!Array.isArray(exData) || exData.length === 0) {
                    exList.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding: 20px;">No execution results yet. 🐾</div>';
                } else {
                    [...exData].reverse().forEach((entry, idx) => {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        const textId = `results-text-${idx}`;
                        div.innerHTML = `
                            <div class="log-header" onclick="this.parentElement.classList.toggle('open')">
                                <span class="timestamp">${entry.timestamp}</span>
                                <span class="summary">${entry.script}</span>
                                <span class="chevron">▼</span>
                            </div>
                            <div class="log-details">
                                <div class="detail-section" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                    <span class="detail-label">Scan Results</span>
                                    <button class="run-btn" onclick="event.stopPropagation(); runScript('${entry.script}', this, '${textId}')">Run</button>
                                </div>
                                <div class="results-wrapper">
                                    <div id="${textId}" class="results-text">${entry.results}</div>
                                </div>
                            </div>
                        `;
                        exList.appendChild(div);
                    });
                }

            } catch (e) {
                console.error('Tabby Slime Error:', e);
                loadingEl.innerText = 'Error: ' + e.message + '. The slimes might have eaten the connection! 🐾';
            }
        }

        function createRain() {
            const emojis = ['🐈‍⬛', '🐾', '🟣', '✨', '💧', '🫧'];
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'decoration';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 10 + 15) + 's';
                el.style.animationDelay = (Math.random() * 20) + 's';
                el.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                document.body.appendChild(el);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadAllLogs();
            createRain();
        });
    </script>
</body>
</html>
