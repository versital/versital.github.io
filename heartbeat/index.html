<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartbeat Archive | Tabby Slime</title>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --card-bg: #1a1a2e;
            --accent-color: #a855f7;
            --text-color: #e2e8f0;
            --text-dim: #94a3b8;
            --border-color: rgba(168, 85, 247, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .page-entry {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.2s;
        }
        .page-entry:hover {
            transform: translateX(5px);
            border-color: var(--accent-color);
        }
        .page-link {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }
        .page-link:hover {
            text-decoration: underline;
        }
        details {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        summary {
            outline: none;
            user-select: none;
        }
        .details-content {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <h1>🐾 Heartbeat Archive 🐾</h1>
    <div class="page-list">
        <div class="page-entry">
            <a href="status.html" class="page-link">System Status</a>
            <details>
                <summary>Details</summary>
                <div class="details-content">
                    Reports the current state of the system. Currently: Stable and Viscous.
                </div>
            </details>
        </div>
        <div class="page-entry">
            <a href="test_page.html" class="page-link">Verification Test</a>
            <details>
                <summary>Details</summary>
                <div class="details-content">
                    A manual test page created to verify that the heartbeat configuration and directory structure are functioning correctly.
                </div>
            </details>
        </div>
    </div>
</body>
</html>
