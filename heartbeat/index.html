<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartbeat Archive | Tabby Slime</title>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --card-bg: #1a1a2e;
            --accent-color: #a855f7;
            --text-color: #e2e8f0;
            --text-dim: #94a3b8;
            --border-color: rgba(168, 85, 247, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .page-entry {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 15px;
            transition: border-color 0.2s;
        }
        .page-entry:hover {
            border-color: var(--accent-color);
        }
        details {
            width: 100%;
        }
        summary {
            list-style: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            padding: 10px 0;
            outline: none;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        summary::-webkit-details-marker {
            display: none;
        }
        summary::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--text-dim);
            transition: transform 0.3s;
        }
        details[open] summary::after {
            transform: rotate(180deg);
        }
        .details-content {
            margin-top: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .description {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .open-btn {
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            align-self: flex-start;
            transition: background 0.2s, transform 0.1s;
        }
        .open-btn:hover {
            background: #c084fc;
            transform: scale(1.05);
        }
        .open-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h1>🐾 Heartbeat Archive 🐾</h1>
    <div class="page-list">
        <div class="page-entry">
            <details>
                <summary>System Status</summary>
                <div class="details-content">
                    <div class="description">
                        Reports the current state of the system. Currently: Stable and Viscous.
                    </div>
                    <a href="status.html" class="open-btn">Open Page</a>
                </div>
            </details>
        </div>
        <div class="page-entry">
            <details>
                <summary>Verification Test</summary>
                <div class="details-content">
                    <div class="description">
                        A manual test page created to verify that the heartbeat configuration and directory structure are functioning correctly.
                    </div>
                    <a href="test_page.html" class="open-btn">Open Page</a>
                </div>
            </details>
        </div>
    </div>
</body>
</html>
